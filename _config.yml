# ─────────────────────────────────────────────
#  Jekyll build settings — don't touch these
# ─────────────────────────────────────────────

theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM                  # GitHub-flavoured markdown
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: "highlight"
    block:
      line_numbers: false

# Collections let us treat projects like blog posts
collections:
  projects:
    output: true
    permalink: /projects/:name/

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"

# Files Jekyll should ignore
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - README.md
  - "*.sh"
